<!-- navbar.component.html -->
<nav class="navbar navbar-main">
  <div class="container d-flex justify-content-between align-items-center">
    <!-- IZQUIERDA -->
    <div class="navbar-left">
      <a routerLink="/" class="logo">
        <span>Licitaciones IA</span>
      </a>
    </div>

    <!-- CENTRO -->
    <ul class="navbar-center mb-0">
      <li>
        <a routerLink="/main" routerLinkActive="active">Home</a>
      </li>
      <li>
        <a routerLink="/licitaciones/list" routerLinkActive="active">Licitaciones</a>
      </li>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li>
        <a routerLink="/config" routerLinkActive="active">Configuración</a>
      </li>
      <li *ngIf="isAdmin()">
        <a routerLink="/admin/monitoring" routerLinkActive="active">Monitoreo</a>
      </li>
    </ul>

    <!-- DERECHA -->
    <div class="navbar-right d-flex align-items-center">
      <div class="user-info me-3">
        <span class="user-name">{{ userName }}</span>
        <span class="company-name">{{ companyName }}</span>
      </div>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </div>
</nav>
